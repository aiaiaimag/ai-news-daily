<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 뉴스 데일리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;800&family=JetBrains+Mono:wght@400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0c;
      --surface: #111114;
      --surface-hover: #18181c;
      --border: #222228;
      --border-accent: #2a2a32;
      --text: #e8e6e3;
      --text-dim: #8a8894;
      --text-muted: #5a5868;
      --accent: #6ee7b7;
      --accent-dim: rgba(110, 231, 183, 0.12);
      --accent2: #818cf8;
      --accent2-dim: rgba(129, 140, 248, 0.12);
      --youth: #f472b6;
      --youth-dim: rgba(244, 114, 182, 0.10);
      --high: #fbbf24;
      --font-body: 'Noto Sans KR', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --font-display: 'Playfair Display', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Header ── */
    .header {
      padding: 3rem 2rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 2rem;
      right: 2rem;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .logo-mark {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .logo-title {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .meta-item {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .meta-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Main grid ── */
    .dashboard {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 860px) {
      .dashboard { grid-template-columns: 1fr; }
    }

    /* ── Section ── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }

    .section:nth-child(2) { animation-delay: 0.15s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .section-header {
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-flag {
      font-size: 1.3rem;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .section-domestic .section-title { color: var(--accent); }
    .section-global .section-title { color: var(--accent2); }

    .section-count {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
      background: var(--bg);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }

    /* ── News card ── */
    .news-list {
      padding: 0.5rem;
    }

    .news-card {
      display: block;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s ease;
      position: relative;
      border: 1px solid transparent;
    }

    .news-card:hover {
      background: var(--surface-hover);
      border-color: var(--border-accent);
    }

    .news-card + .news-card {
      margin-top: 2px;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .card-num {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 1.5rem;
      padding-top: 0.15rem;
      flex-shrink: 0;
    }

    .card-content {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
      margin-bottom: 0.4rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-card:hover .card-title {
      color: #fff;
    }

    .card-summary {
      font-size: 0.78rem;
      color: var(--text-dim);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.5rem;
      padding-left: 2.25rem;
    }

    .card-source {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .card-badge {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 600;
      padding: 0.1rem 0.45rem;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-youth {
      color: var(--youth);
      background: var(--youth-dim);
    }

    .badge-high {
      color: var(--high);
      background: rgba(251, 191, 36, 0.1);
    }

    .card-arrow {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0;
      transform: translateX(-4px);
      transition: all 0.2s ease;
    }

    .news-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── Footer ── */
    .footer {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      text-align: center;
    }

    .footer p {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      gap: 1rem;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    /* ── Empty state ── */
    .empty {
      padding: 3rem;
      text-align: center;
    }

    .empty-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }

    .empty-text {
      font-size: 0.82rem;
      color: var(--text-dim);
    }

    .empty-sub {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
    }

    /* ── Login overlay ── */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-overlay.hidden { display: none; }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 90%;
      max-width: 420px;
      animation: fadeUp 0.5s ease forwards;
    }

    .login-logo {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .login-desc {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .login-input-wrap {
      position: relative;
      margin-bottom: 1rem;
    }

    .login-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-input:focus {
      border-color: var(--accent);
    }

    .login-input::placeholder {
      color: var(--text-muted);
    }

    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .login-btn:hover { opacity: 0.9; }
    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .login-error {
      font-size: 0.75rem;
      color: #f87171;
      margin-top: 0.75rem;
      display: none;
    }

    .login-error.show { display: block; }

    /* ── Logout button ── */
    .logout-btn {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      color: var(--text);
      border-color: var(--border-accent);
    }

    .app-content.hidden { display: none; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <!-- Login Overlay -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <div class="login-logo">
        <span class="logo-mark">Daily</span>
        <span class="logo-title" style="font-family:var(--font-display);font-size:1.6rem;font-weight:900;color:var(--text);">AI News</span>
      </div>
      <p class="login-desc">AI 뉴스 대시보드에 접근하려면 로그인하세요.</p>
      <form id="login-form" autocomplete="off">
        <div class="login-input-wrap">
          <input type="text" class="login-input" id="login-id" placeholder="아이디" required />
        </div>
        <div class="login-input-wrap">
          <input type="password" class="login-input" id="login-pw" placeholder="비밀번호" required />
        </div>
        <button type="submit" class="login-btn" id="login-btn">로그인</button>
      </form>
      <p class="login-error" id="login-error">아이디 또는 비밀번호가 올바르지 않습니다.</p>
    </div>
  </div>

  <!-- App Content -->
  <div class="app-content hidden" id="app-content">
  <header class="header">
    <div class="logo">
      <span class="logo-mark">Daily</span>
      <h1 class="logo-title">AI News</h1>
    </div>
    <div class="header-meta">
      <span class="meta-item">
        <span class="meta-dot"></span>
        <span id="updated-at">불러오는 중...</span>
      </span>
      <span class="meta-item">국내 10 · 글로벌 10</span>
      <span class="meta-item">Google News · Claude 선별</span>
      <button class="logout-btn" id="logout-btn">로그아웃</button>
    </div>
  </header>

  <main class="dashboard">
    <!-- 국내 -->
    <section class="section section-domestic">
      <div class="section-header">
        <div class="section-label">
          <span class="section-flag">🇰🇷</span>
          <span class="section-title">국내</span>
        </div>
        <span class="section-count" id="domestic-count">—</span>
      </div>
      <div class="news-list" id="domestic-list">
        <div class="loading">
          <div class="loading-spinner"></div>
          <div class="loading-text">뉴스 불러오는 중...</div>
        </div>
      </div>
    </section>

    <!-- 글로벌 -->
    <section class="section section-global">
      <div class="section-header">
        <div class="section-label">
          <span class="section-flag">🌍</span>
          <span class="section-title">글로벌</span>
        </div>
        <span class="section-count" id="global-count">—</span>
      </div>
      <div class="news-list" id="global-list">
        <div class="loading">
          <div class="loading-spinner"></div>
          <div class="loading-text">뉴스 불러오는 중...</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>매일 오전 8시(KST) 자동 업데이트 · GitHub Actions + Netlify · Powered by Claude</p>
  </footer>
  </div><!-- /app-content -->

  <script>
    // ── Auth ──
    const ACCOUNTS = [
      { id: 'admin', pw: '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918' }
    ];

    async function hashPassword(pw) {
      const encoded = new TextEncoder().encode(pw);
      const buffer = await crypto.subtle.digest('SHA-256', encoded);
      return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function checkAuth() {
      const session = localStorage.getItem('ainews_auth');
      if (session === 'authenticated') {
        showApp();
      } else {
        showLogin();
      }
    }

    function showLogin() {
      document.getElementById('login-overlay').classList.remove('hidden');
      document.getElementById('app-content').classList.add('hidden');
    }

    function showApp() {
      document.getElementById('login-overlay').classList.add('hidden');
      document.getElementById('app-content').classList.remove('hidden');
      loadNews();
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('login-id').value.trim();
      const pw = document.getElementById('login-pw').value;
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');

      btn.disabled = true;
      btn.textContent = '확인 중...';
      errorEl.classList.remove('show');

      const pwHash = await hashPassword(pw);
      const matched = ACCOUNTS.find(a => a.id === id && a.pw === pwHash);

      if (matched) {
        localStorage.setItem('ainews_auth', 'authenticated');
        showApp();
      } else {
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('ainews_auth');
      showLogin();
    });
    async function loadNews() {
      try {
        const res = await fetch('./data.json?' + Date.now());
        if (!res.ok) throw new Error('데이터 없음');
        const data = await res.json();

        document.getElementById('updated-at').textContent = data.updatedAt || '업데이트 시간 없음';

        renderSection('domestic-list', 'domestic-count', data.domestic, 'domestic');
        renderSection('global-list', 'global-count', data.global, 'global');
      } catch (err) {
        console.error(err);
        document.querySelectorAll('.news-list').forEach(el => {
          el.innerHTML = `
            <div class="empty">
              <div class="empty-icon">📡</div>
              <div class="empty-text">아직 뉴스가 수집되지 않았습니다</div>
              <div class="empty-sub">GitHub Actions를 실행하거나 로컬에서 fetch-news.js를 실행하세요</div>
            </div>
          `;
        });
      }
    }

    function renderSection(listId, countId, articles, type) {
      const list = document.getElementById(listId);
      const count = document.getElementById(countId);

      if (!articles || articles.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📭</div>
            <div class="empty-text">오늘 수집된 뉴스가 없습니다</div>
          </div>
        `;
        count.textContent = '0건';
        return;
      }

      count.textContent = `${articles.length}건`;

      list.innerHTML = articles.map((a, i) => {
        const badges = [];
        if (a.relevance === 'high') badges.push('<span class="card-badge badge-high">주목</span>');
        if (a.youthAppeal) badges.push('<span class="card-badge badge-youth">MZ</span>');

        return `
          <a class="news-card" href="${escapeHtml(a.link)}" target="_blank" rel="noopener noreferrer"
             style="animation: fadeUp 0.4s ease ${i * 0.05}s both">
            <div class="card-top">
              <span class="card-num">${String(i + 1).padStart(2, '0')}</span>
              <div class="card-content">
                <div class="card-title">${escapeHtml(a.title)}</div>
                <div class="card-summary">${escapeHtml(a.summary)}</div>
              </div>
            </div>
            <div class="card-footer">
              <span class="card-source">${escapeHtml(a.source)}</span>
              ${badges.join('')}
              <span class="card-arrow">→</span>
            </div>
          </a>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    checkAuth();
  </script>
</body>
</html>
